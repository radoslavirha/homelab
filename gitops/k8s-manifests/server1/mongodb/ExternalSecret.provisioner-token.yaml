---
# OpenBao provisioner token for server1 — mongodb namespace copy
# Mirrors gitops/k8s-manifests/server1/iot/ExternalSecret.provisioner-token.yaml
# Needed by MongoDB provisioner Jobs which run in the mongodb namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-provision-token
  namespace: mongodb
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openbao-provision-token
  data:
    - secretKey: token
      remoteRef:
        key: server1/provisioner-token
        property: token
