---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: otel-auth-token
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: otel-auth-token
  data:
    - secretKey: OTEL_AUTH_TOKEN
      remoteRef:
        # Same token as server3 — server1 uses it to authenticate outbound OTLP to server3.
        # Store before first sync: bao kv put secret/otel-gateway/auth-token token=$(openssl rand -base64 32 | tr -d '=+/')
        key: otel-gateway/auth-token
        property: token
