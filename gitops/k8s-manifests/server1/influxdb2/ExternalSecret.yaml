---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb2
  namespace: iot
  annotations:
    # Wave -1: ArgoCD waits for Ready=True (Secret populated by ESO) before advancing
    # to wave 0 where the InfluxDB2 pod starts. Ensures adminUser.existingSecret exists
    # before the pod starts on first deploy.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: influxdb2
  data:
    - secretKey: admin-password
      remoteRef:
        # Store before first sync: bao kv put secret/server1/influxdb2 admin-password=<...> admin-token=<...>
        key: server1/influxdb2
        property: admin-password
    - secretKey: admin-token
      remoteRef:
        key: server1/influxdb2
        property: admin-token
