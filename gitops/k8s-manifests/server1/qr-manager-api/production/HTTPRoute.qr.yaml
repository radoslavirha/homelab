---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qr-home
  namespace: production
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - qr.home
  rules:
    - backendRefs:
        - name: api-iot-qr-manager-api-http
          namespace: production
          port: 80
