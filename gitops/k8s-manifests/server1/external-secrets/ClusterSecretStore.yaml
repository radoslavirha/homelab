---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  provider:
    vault:
      # OpenBao runs on server3 — reach it over LAN via Traefik HTTPRoute.
      server: "http://vault.server3.home"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Dedicated auth mount for server1 (server3 uses kubernetes-server3).
          mountPath: "kubernetes-server1"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
