---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: emqx-credentials
  namespace: iot
  annotations:
    # Wave -1: ArgoCD waits for Ready=True (Secret populated by ESO) before advancing
    # to wave 0 where the EMQX pod starts. Ensures Mnesia is initialized with the
    # correct password on first deploy, not the Helm chart default "public".
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: emqx-credentials
  data:
    - secretKey: EMQX_DASHBOARD__DEFAULT_USERNAME
      remoteRef:
        # Store before first sync: bao kv put secret/server1/emqx dashboard-username=<...> dashboard-password=<...>
        key: server1/emqx
        property: dashboard-username
    - secretKey: EMQX_DASHBOARD__DEFAULT_PASSWORD
      remoteRef:
        key: server1/emqx
        property: dashboard-password
