---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: emqx-credentials
  namespace: iot
  annotations:
    # Sync the secret before EMQX pod starts — chart requires envFromSecret to exist.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: emqx-credentials
  data:
    - secretKey: EMQX_DASHBOARD__DEFAULT_USERNAME
      remoteRef:
        # Store before first sync: bao kv put secret/server1/emqx dashboard-username=<...> dashboard-password=<...>
        key: server1/emqx
        property: dashboard-username
    - secretKey: EMQX_DASHBOARD__DEFAULT_PASSWORD
      remoteRef:
        key: server1/emqx
        property: dashboard-password
