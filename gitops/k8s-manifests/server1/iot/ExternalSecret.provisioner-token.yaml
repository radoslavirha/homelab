---
# OpenBao provisioner token for server1
# Provides write access to secret/data/server1/* paths and targeted server3 paths.
# Used by PostSync Jobs in the iot namespace to write provisioned credentials back to OpenBao.
#
# One-time setup (run after iot stage is deployed):
#   bao policy write server1-provisioner - <<'EOF'
#   path "secret/data/server1/*" { capabilities = ["create", "update"] }
#   path "secret/data/server3/influxdb2-grafana" { capabilities = ["create", "update"] }
#   EOF
#   TOKEN=$(bao token create -policy=server1-provisioner -period=8760h -display-name="server1-provisioner" -field=token)
#   bao kv put secret/server1/provisioner-token token="${TOKEN}"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-provision-token
  namespace: iot
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openbao-provision-token
  data:
    - secretKey: token
      remoteRef:
        key: server1/provisioner-token
        property: token
