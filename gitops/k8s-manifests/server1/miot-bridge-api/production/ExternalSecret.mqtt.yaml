---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miot-bridge-api-mqtt-credentials
  namespace: production
  annotations:
    # Wave -1: secret must exist before miot-bridge pod starts (wave 0).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: miot-bridge-api-mqtt-credentials
  data:
    - secretKey: SECRET_MQTT_MIOT_BRIDGE_USERNAME
      remoteRef:
        key: server1/production/miot-bridge-api-emqx
        property: mqtt-username
    - secretKey: SECRET_MQTT_MIOT_BRIDGE_PASSWORD
      remoteRef:
        key: server1/production/miot-bridge-api-emqx
        property: mqtt-password
