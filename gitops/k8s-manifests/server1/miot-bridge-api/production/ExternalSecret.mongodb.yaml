---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miot-bridge-api-mongodb-credentials
  namespace: production
  annotations:
    # Wave -1: secret must exist before miot-bridge pod starts (wave 0).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: miot-bridge-api-mongodb-credentials
  data:
    - secretKey: SECRET_MONGODB_DATABASE
      remoteRef:
        key: server1/production/miot-bridge-api-mongodb
        property: mongodb-database
    - secretKey: SECRET_MONGODB_USERNAME
      remoteRef:
        key: server1/production/miot-bridge-api-mongodb
        property: mongodb-username
    - secretKey: SECRET_MONGODB_PASSWORD
      remoteRef:
        key: server1/production/miot-bridge-api-mongodb
        property: mongodb-password
