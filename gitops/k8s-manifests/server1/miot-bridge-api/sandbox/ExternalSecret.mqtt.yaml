---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miot-bridge-api-mqtt-credentials
  namespace: sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: miot-bridge-api-mqtt-credentials
  data:
    - secretKey: SECRET_MQTT_MIOT_BRIDGE_USERNAME
      remoteRef:
        key: server1/sandbox/miot-bridge-api-emqx
        property: mqtt-username
    - secretKey: SECRET_MQTT_MIOT_BRIDGE_PASSWORD
      remoteRef:
        key: server1/sandbox/miot-bridge-api-emqx
        property: mqtt-password
