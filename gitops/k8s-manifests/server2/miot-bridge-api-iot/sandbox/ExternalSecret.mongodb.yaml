---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miot-bridge-api-mongodb-credentials
  namespace: sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: miot-bridge-api-mongodb-credentials
  data:
    - secretKey: SECRET_MONGODB_DATABASE
      remoteRef:
        key: server2/sandbox/miot-bridge-api-iot
        property: mongodb-database
    - secretKey: SECRET_MONGODB_USERNAME
      remoteRef:
        key: server2/sandbox/miot-bridge-api-iot
        property: mongodb-username
    - secretKey: SECRET_MONGODB_PASSWORD
      remoteRef:
        key: server2/sandbox/miot-bridge-api-iot
        property: mongodb-password
