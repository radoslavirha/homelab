---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-credentials
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-credentials
  data:
    - secretKey: api-key
      remoteRef:
        # OpenBao KV path: secret/data/server2/external-dns (server2-specific)
        # Store the Unifi API key: bao kv put secret/server2/external-dns api-key=<value>
        key: server2/external-dns
        property: api-key
