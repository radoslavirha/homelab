---
# MongoDB PostSync provisioner: miot-bridge database + user (production) — create-only (idempotent)
# Runs on every ArgoCD sync of the mongodb ApplicationSet.
# Creates database "miot-bridge-production" and user "miot-bridge-production" with dbOwner role.
# Writes credentials to OpenBao merged with any existing keys (EMQX provisioner writes mqtt-* separately).
# Consumed by: ExternalSecret miot-bridge-api-mongodb-credentials in production namespace.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-provision-miot-bridge-production
  namespace: mongodb
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: provisioner
          image: bitnami/mongodb:8.0
          env:
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: mongodb-root-password
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-provision-token
                  key: token
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              MONGO_HOST="mongodb.mongodb.svc.cluster.local:27017"
              DB_NAME="miot-bridge-production"
              DB_USER="miot-bridge-production"
              BAO_HOST="http://vault.server3.home"
              BAO_PATH="server2/production/miot-bridge-api-iot"

              # Idempotency: skip if user already exists in the target database
              USER_EXISTS=$(mongosh \
                "mongodb://root:${MONGO_ROOT_PASSWORD}@${MONGO_HOST}/admin?authSource=admin" \
                --quiet \
                --eval "db.getSiblingDB('${DB_NAME}').getUser('${DB_USER}') ? 'exists' : 'missing'")

              if [ "${USER_EXISTS}" = "exists" ]; then
                echo "MongoDB user '${DB_USER}' already exists. Skipping."
                exit 0
              fi

              DB_PASS=$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 24)

              mongosh \
                "mongodb://root:${MONGO_ROOT_PASSWORD}@${MONGO_HOST}/admin?authSource=admin" \
                --quiet \
                --eval "
                  db.getSiblingDB('${DB_NAME}').createUser({
                    user: '${DB_USER}',
                    pwd: '${DB_PASS}',
                    roles: [{ role: 'dbOwner', db: '${DB_NAME}' }]
                  });
                "

              echo "Created MongoDB user '${DB_USER}' in database '${DB_NAME}'."

              # Write credentials to OpenBao (merged with any existing keys at this path)
              curl -sf -X PATCH \
                -H "X-Vault-Token: ${BAO_TOKEN}" \
                -H "Content-Type: application/json" \
                "${BAO_HOST}/v1/secret/data/${BAO_PATH}" \
                -d "{\"data\": {\"mongodb-database\": \"${DB_NAME}\", \"mongodb-username\": \"${DB_USER}\", \"mongodb-password\": \"${DB_PASS}\"}}"

              echo "Credentials written to OpenBao at ${BAO_PATH}."
