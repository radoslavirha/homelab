---
# MongoDB PostSync provisioner: miot-bridge database + user (sandbox) — create-only (idempotent)
# Runs on every ArgoCD sync of the mongodb ApplicationSet.
# Creates database "miot-bridge-sandbox" and user "miot-bridge-sandbox" with dbOwner role.
# Writes credentials to a service-owned OpenBao path.
# Consumed by: ExternalSecret miot-bridge-api-mongodb-credentials in sandbox namespace.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-provision-miot-bridge-sandbox
  namespace: mongodb
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: provisioner
          image: bitnami/mongodb:latest
          securityContext:
            runAsUser: 0
          env:
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: mongodb-root-password
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-provision-token
                  key: token
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              tdnf install -y curl > /dev/null 2>&1

              MONGO_HOST="mongodb.mongodb.svc.cluster.local:27017"
              DB_NAME="miot-bridge-sandbox"
              DB_USER="miot-bridge-sandbox"
              BAO_HOST="http://vault.server3.home"
              BAO_PATH="server2/sandbox/miot-bridge-api-mongodb"

              # Idempotency: skip if credentials already in OpenBao
              BAO_RESPONSE=$(curl -s -H "X-Vault-Token: ${BAO_TOKEN}" \
                "${BAO_HOST}/v1/secret/data/${BAO_PATH}")

              if echo "${BAO_RESPONSE}" | grep -q '"mongodb-password"'; then
                echo "MongoDB credentials already in OpenBao. Skipping."
                exit 0
              fi

              DB_PASS=$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 24)

              # Create or update MongoDB user (idempotent: reset password if user already exists)
              USER_EXISTS=$(mongosh \
                "mongodb://root:${MONGO_ROOT_PASSWORD}@${MONGO_HOST}/admin?authSource=admin" \
                --quiet \
                --eval "db.getSiblingDB('${DB_NAME}').getUser('${DB_USER}') ? 'exists' : 'missing'")

              if [ "${USER_EXISTS}" = "exists" ]; then
                echo "MongoDB user '${DB_USER}' exists. Resetting password..."
                mongosh \
                  "mongodb://root:${MONGO_ROOT_PASSWORD}@${MONGO_HOST}/admin?authSource=admin" \
                  --quiet \
                  --eval "db.getSiblingDB('${DB_NAME}').changeUserPassword('${DB_USER}', '${DB_PASS}');"
              else
                mongosh \
                  "mongodb://root:${MONGO_ROOT_PASSWORD}@${MONGO_HOST}/admin?authSource=admin" \
                  --quiet \
                  --eval "
                    db.getSiblingDB('${DB_NAME}').createUser({
                      user: '${DB_USER}',
                      pwd: '${DB_PASS}',
                      roles: [{ role: 'dbOwner', db: '${DB_NAME}' }]
                    });
                  "
                echo "Created MongoDB user '${DB_USER}' in database '${DB_NAME}'."
              fi

              # Write credentials to a service-owned OpenBao path.
              BAO_PAYLOAD="{\"data\": {\"mongodb-database\": \"${DB_NAME}\", \"mongodb-username\": \"${DB_USER}\", \"mongodb-password\": \"${DB_PASS}\"}}"
              HTTP_STATUS=$(curl -s -o /tmp/bao_response -w "%{http_code}" -X POST \
                -H "X-Vault-Token: ${BAO_TOKEN}" \
                -H "Content-Type: application/json" \
                "${BAO_HOST}/v1/secret/data/${BAO_PATH}" \
                -d "${BAO_PAYLOAD}")

              if [ "${HTTP_STATUS}" != "200" ]; then
                echo "ERROR: OpenBao write failed with status ${HTTP_STATUS}"; cat /tmp/bao_response; exit 1
              fi

              echo "Credentials written to OpenBao at ${BAO_PATH}."
