---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb
  namespace: mongodb
  annotations:
    # Sync the secret before MongoDB pod starts — chart requires auth.existingSecret to exist.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mongodb
  data:
    - secretKey: mongodb-root-password
      remoteRef:
        # Store before first sync: bao kv put secret/server2/mongodb root-password=<...>
        key: server2/mongodb
        property: root-password
