---
# OpenBao provisioner token for server2
# Provides write access to secret/data/server2/* paths.
# Used by PostSync Jobs in the iot namespace to write provisioned credentials back to OpenBao.
#
# One-time setup (run after iot stage is deployed):
#   bao policy write server2-provisioner - <<'EOF'
#   path "secret/data/server2/*" { capabilities = ["create", "update"] }
#   EOF
#   TOKEN=$(bao token create -policy=server2-provisioner -period=8760h -display-name="server2-provisioner" -field=token)
#   bao kv put secret/server2/provisioner-token token="${TOKEN}"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-provision-token
  namespace: iot
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openbao-provision-token
  data:
    - secretKey: token
      remoteRef:
        key: server2/provisioner-token
        property: token
