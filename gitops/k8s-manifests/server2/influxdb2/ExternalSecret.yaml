---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb2
  namespace: monitoring
  annotations:
    # Sync the secret before InfluxDB2 pod starts — chart requires adminUser.existingSecret to exist.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: influxdb2
  data:
    - secretKey: admin-password
      remoteRef:
        # Store before first sync: bao kv put secret/server2/influxdb2 admin-password=<...> admin-token=<...>
        key: server2/influxdb2
        property: admin-password
    - secretKey: admin-token
      remoteRef:
        key: server2/influxdb2
        property: admin-token
