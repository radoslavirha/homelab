---
# EMQX PostSync provisioner: Telegraf MQTT user — create-only (idempotent)
# Runs on every ArgoCD sync. On first deploy:
#   1. Ensures built-in database authenticator is configured
#   2. Creates the "telegraf" MQTT user with a random password
#   3. Writes credentials to OpenBao: secret/server2/telegraf-mqtt
# On subsequent syncs: user already exists → skip (no-op).
# Consumed by: ExternalSecret telegraf-mqtt-credentials in telegraf namespace
apiVersion: batch/v1
kind: Job
metadata:
  name: emqx-provision-telegraf
  namespace: iot
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: provisioner
          image: alpine:3.20
          env:
            - name: EMQX_USER
              valueFrom:
                secretKeyRef:
                  name: emqx-credentials
                  key: EMQX_DASHBOARD__DEFAULT_USERNAME
            - name: EMQX_PASS
              valueFrom:
                secretKeyRef:
                  name: emqx-credentials
                  key: EMQX_DASHBOARD__DEFAULT_PASSWORD
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-provision-token
                  key: token
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl jq > /dev/null

              EMQX_HOST="http://emqx.iot.svc.cluster.local:18083"
              MQTT_USER="telegraf"
              BAO_HOST="http://vault.server3.home"

              # Ensure built-in database authenticator is configured (idempotent)
              AUTH_EXISTS=$(curl -sf \
                -u "${EMQX_USER}:${EMQX_PASS}" \
                "${EMQX_HOST}/api/v5/authentication" \
                | jq '[.[] | select(.backend=="built_in_database")] | length')

              if [ "${AUTH_EXISTS:-0}" -eq 0 ]; then
                echo "Configuring built-in database authenticator..."
                curl -sf -X POST \
                  -u "${EMQX_USER}:${EMQX_PASS}" \
                  -H "Content-Type: application/json" \
                  "${EMQX_HOST}/api/v5/authentication" \
                  -d '{
                    "mechanism": "password_based",
                    "backend": "built_in_database",
                    "password_hash_algorithm": {"name": "bcrypt", "salt_rounds": 10},
                    "user_id_type": "username"
                  }'
                echo "Authenticator configured."
              fi

              # Idempotency: skip if user already exists (already in OpenBao from first run).
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -u "${EMQX_USER}:${EMQX_PASS}" \
                "${EMQX_HOST}/api/v5/authentication/password_based:built_in_database/users/${MQTT_USER}")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "MQTT user '${MQTT_USER}' already exists. Skipping."
                exit 0
              fi

              # Generate random password and create user
              MQTT_PASS=$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 24)

              curl -sf -X POST \
                -u "${EMQX_USER}:${EMQX_PASS}" \
                -H "Content-Type: application/json" \
                "${EMQX_HOST}/api/v5/authentication/password_based:built_in_database/users" \
                -d "{\"user_id\": \"${MQTT_USER}\", \"password\": \"${MQTT_PASS}\", \"is_superuser\": false}"

              echo "Created MQTT user '${MQTT_USER}'."

              # Write credentials to OpenBao
              curl -sf -X POST \
                -H "X-Vault-Token: ${BAO_TOKEN}" \
                -H "Content-Type: application/json" \
                "${BAO_HOST}/v1/secret/data/server2/telegraf-mqtt" \
                -d "{\"data\": {\"username\": \"${MQTT_USER}\", \"password\": \"${MQTT_PASS}\"}}"

              echo "MQTT user '${MQTT_USER}' created and credentials written to OpenBao."
