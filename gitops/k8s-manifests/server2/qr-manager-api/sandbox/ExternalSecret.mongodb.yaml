---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qr-manager-api-mongodb-credentials
  namespace: sandbox
  annotations:
    # Wave -1: secret must exist before qr-manager-api pod starts (wave 0).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: qr-manager-api-mongodb-credentials
  data:
    - secretKey: SECRET_MONGODB_DATABASE
      remoteRef:
        key: server2/sandbox/qr-manager-api-mongodb
        property: mongodb-database
    - secretKey: SECRET_MONGODB_USERNAME
      remoteRef:
        key: server2/sandbox/qr-manager-api-mongodb
        property: mongodb-username
    - secretKey: SECRET_MONGODB_PASSWORD
      remoteRef:
        key: server2/sandbox/qr-manager-api-mongodb
        property: mongodb-password
