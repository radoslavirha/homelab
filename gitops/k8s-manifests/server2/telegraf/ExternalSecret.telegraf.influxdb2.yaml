---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegraf-influxdb2-credentials
  namespace: telegraf
  annotations:
    # Sync before Telegraf pod starts — chart references secretKeyRef on this secret.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: telegraf-influxdb2-credentials
  data:
    - secretKey: INFLUXDB2_TOKEN
      remoteRef:
        # Written by influxdb2/provisioner-telegraf PostSync Job.
        # Store path: secret/server2/telegraf-influxdb2 → token
        key: server2/telegraf-influxdb2
        property: token
