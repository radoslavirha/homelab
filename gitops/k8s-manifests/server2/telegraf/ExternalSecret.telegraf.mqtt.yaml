---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegraf-mqtt-credentials
  namespace: telegraf
  annotations:
    # Sync before Telegraf pod starts — chart references secretKeyRef on this secret.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: telegraf-mqtt-credentials
  data:
    - secretKey: MQTT_USERNAME
      remoteRef:
        # Written by emqx/provisioner-telegraf PostSync Job.
        # Store path: secret/server2/telegraf-mqtt → username, password
        key: server2/telegraf-mqtt
        property: username
    - secretKey: MQTT_PASSWORD
      remoteRef:
        key: server2/telegraf-mqtt
        property: password
