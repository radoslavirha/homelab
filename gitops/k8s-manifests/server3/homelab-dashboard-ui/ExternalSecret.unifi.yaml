---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homelab-dashboard-ui-unifi-credentials
  namespace: homelab
  annotations:
    # Wave -1: secret must exist before homelab-dashboard-ui pod starts (wave 0).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: homelab-dashboard-ui-unifi-credentials
  data:
    - secretKey: SECRET_UNIFI_API_KEY
      remoteRef:
        key: server3/homelab-dashboard-ui-unifi
        property: api-key
