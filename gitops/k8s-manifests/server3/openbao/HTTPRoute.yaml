---
# Exposes the OpenBao API via Traefik so that server2's ESO can reach it cross-cluster.
# ExternalDNS will create: vault.server3.home → 192.168.1.202
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openbao
  namespace: openbao
  annotations:
    # Deploy after ESO + ClusterSecretStore are ready (wave 100) but Traefik must already be up.
    argocd.argoproj.io/sync-wave: "200"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - vault.server3.home
  rules:
    - backendRefs:
        - name: openbao
          namespace: openbao
          port: 8200
