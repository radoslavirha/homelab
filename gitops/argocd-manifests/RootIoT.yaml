# IoT App-of-Apps: InfluxDB2, EMQX — all applicable clusters.
# Applied once manually after RootGateway (Traefik must be running before HTTPRoutes can bind).
# ArgoCD auto-syncs from that point on.
# Manual apply: kubectl apply -f gitops/argocd-manifests/RootIoT.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-iot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/iot
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
