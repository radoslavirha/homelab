# Dashboards App-of-Apps: Longhorn, Hubble (Cilium), Headlamp — all clusters.
# Sync wave 3 — needs Traefik (wave 2) for HTTPRoutes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/dashboards
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
