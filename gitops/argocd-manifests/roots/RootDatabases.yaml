# Databases App-of-Apps: MongoDB (+ future PostgreSQL, Redis, …).
# Sync wave 3 — needs ESO (wave 1) for root-password and Traefik (wave 2)
# for IngressRouteTCP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-databases
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/databases
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
