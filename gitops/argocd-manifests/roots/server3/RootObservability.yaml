# Server3-only Observability App-of-Apps: Prometheus, Grafana, Loki, Tempo.
# OTel Gateway is managed by top-level RootObservability.yaml (ApplicationSet).
# Sync wave 3 — Grafana needs ESO (wave 1) for admin secret and Traefik
# (wave 2) for HTTPRoute. LGTM backends share the wave with no hard deps
# on sibling Roots.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-observability-server3
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/server3/apps/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
