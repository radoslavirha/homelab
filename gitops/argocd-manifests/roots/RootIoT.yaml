# IoT App-of-Apps: IotInfra, InfluxDB2, EMQX, Telegraf.
# Sync wave 3 — needs ESO (wave 1) for credentials and Traefik (wave 2)
# for HTTPRoute/IngressRouteTCP. Telegraf is ordered internally via its
# own resource-level sync-wave "1" to wait for the InfluxDB2/EMQX
# post-sync provisioner Jobs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-iot
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/iot
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
