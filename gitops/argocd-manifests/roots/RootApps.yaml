# RootApps — App-of-Apps for custom application stack.
# Discovers ApplicationSets in gitops/argocd-manifests/apps/apps/.
# Sync wave 4 — miot-bridge-api needs MongoDB + EMQX (wave 3),
# apps-otel-collector needs OTel Gateway (wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
