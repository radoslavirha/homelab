# Root Observability App-of-Apps — multi-cluster OTel Gateway.
# Sync wave 3 — needs Traefik (wave 2) for OTLP HTTPRoute/IngressRouteTCP
# and ESO (wave 1) for the otel-auth-token ExternalSecret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
