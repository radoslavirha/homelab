# Gateway App-of-Apps for server3: Traefik + ExternalDNS.
# Applied once (manually or by ArgoCD after self-bootstrap).
# ArgoCD auto-syncs from that point on.
# Manual apply: kubectl apply -f gitops/argocd-manifests/server3/RootGateway.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/gateway
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
