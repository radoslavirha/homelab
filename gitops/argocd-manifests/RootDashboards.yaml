# Dashboards App-of-Apps: Longhorn, Hubble (Cilium), Headlamp — all clusters.
# Applied once (manually or by ArgoCD after self-bootstrap).
# ArgoCD auto-syncs from that point on.
# Manual apply: kubectl apply -f gitops/argocd-manifests/RootDashboards.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/apps/dashboards
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
