# Apps OTel Collector — per-namespace forwarder (production + sandbox)
# Upstream values.yaml: https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-collector/values.yaml
# Release name MUST be otel-collector — app configs hardcode otel-collector-opentelemetry-collector:4318
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-otel-collector
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - cluster: server1
                  clusterServer: https://192.168.1.200:6443
                - cluster: server2
                  clusterServer: https://192.168.1.201:6443
          - list:
              elements:
                - env: production
                - env: sandbox
  template:
    metadata:
      name: apps-otel-collector-{{cluster}}-{{env}}
    spec:
      project: default
      sources:
        - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
          chart: opentelemetry-collector
          targetRevision: 0.149.0
          helm:
            releaseName: otel-collector
            valueFiles:
              - $values/gitops/helm-values/apps/otel-collector/base.yaml
              - $values/gitops/helm-values/apps/otel-collector/{{env}}.yaml
        - repoURL: https://github.com/radoslavirha/homelab
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{clusterServer}}'
        namespace: '{{env}}'
      syncPolicy:
        managedNamespaceMetadata:
          labels:
            pod-security.kubernetes.io/enforce: privileged
        syncOptions:
          - CreateNamespace=true
        automated:
          selfHeal: true
          prune: true
