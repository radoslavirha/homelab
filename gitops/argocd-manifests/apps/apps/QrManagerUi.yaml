# qr-manager-ui — ApplicationSet (server2 × production + sandbox)
# Chart: gitops/helm-charts/iot-applications/ (path-based, no publishing)
# No ExternalSecrets (no secretRefs), no cluster-specific overrides.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: qr-manager-ui
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - cluster: server1
                  clusterServer: https://192.168.1.200:6443
                - cluster: server2
                  clusterServer: https://192.168.1.201:6443
          - list:
              elements:
                - env: production
                - env: sandbox
  template:
    metadata:
      name: qr-manager-ui-{{cluster}}-{{env}}
    spec:
      project: default
      sources:
        - repoURL: https://github.com/radoslavirha/homelab
          targetRevision: HEAD
          path: gitops/helm-charts/iot-applications
          helm:
            releaseName: qr-manager-ui
            valueFiles:
              - $values/gitops/helm-values/apps/qr-manager-ui/base.yaml
              - $values/gitops/helm-values/apps/qr-manager-ui/{{env}}.yaml
              - $values/gitops/helm-values/apps/common/values.yaml
              - $values/gitops/helm-values/apps/common/{{env}}.yaml
              - $values/gitops/helm-values/{{cluster}}/apps/common/values.yaml
              - $values/gitops/helm-values/{{cluster}}/apps/common/{{env}}.yaml
        - repoURL: https://github.com/radoslavirha/homelab
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{clusterServer}}'
        namespace: '{{env}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          selfHeal: true
          prune: true
