apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: headlamp-dashboard
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: server3
            clusterServer: https://kubernetes.default.svc
  template:
    metadata:
      name: headlamp-dashboard-{{cluster}}
    spec:
      project: default
      sources:
        - repoURL: https://kubernetes-sigs.github.io/headlamp/
          chart: headlamp
          targetRevision: 0.41.0
          helm:
            releaseName: headlamp
            valueFiles:
              - $values/gitops/helm-values/headlamp.yaml
              - $values/gitops/helm-values/{{cluster}}/headlamp.yaml
        - repoURL: https://github.com/radoslavirha/homelab
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{clusterServer}}'
        namespace: headlamp
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          selfHeal: true
          prune: true
