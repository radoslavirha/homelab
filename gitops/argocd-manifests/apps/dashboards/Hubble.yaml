apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hubble-dashboard
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: server1
            clusterServer: https://192.168.1.200:6443
          - cluster: server2
            clusterServer: https://192.168.1.201:6443
          - cluster: server3
            clusterServer: https://kubernetes.default.svc
  template:
    metadata:
      name: hubble-dashboard-{{cluster}}
    spec:
      project: default
      source:
        repoURL: https://github.com/radoslavirha/homelab
        targetRevision: HEAD
        path: gitops/k8s-manifests/{{cluster}}/cilium
      destination:
        server: '{{clusterServer}}'
        namespace: kube-system
      syncPolicy:
        automated:
          selfHeal: true
          prune: false
