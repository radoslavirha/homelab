apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: longhorn-dashboard
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: server3
            clusterServer: https://kubernetes.default.svc
          - cluster: server2
            clusterServer: https://192.168.1.201:6443
  template:
    metadata:
      name: longhorn-dashboard-{{cluster}}
    spec:
      project: default
      source:
        repoURL: https://github.com/radoslavirha/homelab
        targetRevision: HEAD
        path: gitops/k8s-manifests/{{cluster}}/longhorn
      destination:
        server: '{{clusterServer}}'
        namespace: longhorn-system
      syncPolicy:
        automated:
          selfHeal: true
          prune: false
