apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns/
      chart: external-dns
      targetRevision: 1.20.0
      helm:
        releaseName: external-dns
        valueFiles:
          - $values/gitops/helm-values/external-dns.yaml
          - $values/gitops/helm-values/server3/external-dns.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      path: gitops/k8s-manifests/server3/external-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
