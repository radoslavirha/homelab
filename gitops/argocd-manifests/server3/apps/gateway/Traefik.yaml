apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.7
      helm:
        valueFiles:
          - $values/gitops/helm-values/traefik.yaml
          - $values/gitops/helm-values/server3/traefik.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
