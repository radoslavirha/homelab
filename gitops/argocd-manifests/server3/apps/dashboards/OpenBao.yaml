# Exposes OpenBao on server3 via a Traefik HTTPRoute (vault.server3.home).
# This allows server2's ESO ClusterSecretStore to reach OpenBao across cluster boundaries.
# Deployed to the openbao namespace so the HTTPRoute is co-located with the service.
# Depends on: traefik-server3 (GatewayClass must exist before this can bind).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao-dashboard-server3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/k8s-manifests/server3/openbao
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
