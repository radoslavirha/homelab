# Prometheus — server3 singleton Application
# Receives remote-write from OTel Gateway; no scraping required.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 29.2.1
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/gitops/helm-values/prometheus.yaml
          - $values/gitops/helm-values/server3/prometheus.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
