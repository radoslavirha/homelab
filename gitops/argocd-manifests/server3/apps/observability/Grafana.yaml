# Grafana — server3 singleton Application
# Credentials via ExternalSecret → grafana-admin Secret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: grafana
      targetRevision: 12.1.1
      helm:
        releaseName: grafana
        valueFiles:
          - $values/gitops/helm-values/grafana.yaml
          - $values/gitops/helm-values/server3/grafana.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      path: gitops/k8s-manifests/server3/grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
