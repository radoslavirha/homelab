# Loki — server3 singleton Application (Monolithic mode, filesystem storage)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: loki
      targetRevision: 13.2.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/gitops/helm-values/loki.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
