# Tempo — server3 singleton Application (single-binary mode, local storage)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-server3
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: tempo
      targetRevision: 2.0.0
      helm:
        releaseName: tempo
        valueFiles:
          - $values/gitops/helm-values/tempo.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
