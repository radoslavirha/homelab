apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp-server3
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: 0.41.0
      helm:
        releaseName: headlamp
        valueFiles:
          - $values/gitops/helm-values/headlamp.yaml
          - $values/gitops/helm-values/server3/headlamp.yaml
    - repoURL: https://github.com/radoslavirha/homelab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
