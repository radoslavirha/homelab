# Infra App-of-Apps for server3: ESO + OpenBao HTTPRoute.
# Applied once (manually or by ArgoCD after self-bootstrap).
# ArgoCD auto-syncs from that point on.
# Manual apply: kubectl apply -f gitops/argocd-manifests/server3/RootInfra.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infra-server3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/server3/apps/infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
