# Server3-specific Dashboards App-of-Apps: HTTPRoutes and other server3-only singleton Applications.
# Applied once manually after RootGateway (Traefik must exist before HTTPRoutes can bind).
# Manual apply: kubectl apply -f gitops/argocd-manifests/server3/RootDashboards.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dashboards-server3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/server3/apps/dashboards
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
