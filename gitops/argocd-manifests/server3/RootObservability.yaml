# Root Observability App-of-Apps for server3.
# Manages server3-only observability Applications: Prometheus, Grafana, Loki, Tempo.
# OTel Gateway is managed by the top-level RootObservability.yaml (ApplicationSet, all clusters).
# Applied once manually after RootGateway (Traefik must exist before HTTPRoutes can bind).
# Manual apply: kubectl apply -f gitops/argocd-manifests/server3/RootObservability.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-observability-server3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/server3/apps/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
