# Bootstrap — meta App-of-Apps. Discovers every Root App under roots/ and
# enforces deploy order via argocd.argoproj.io/sync-wave annotations on the
# Root Applications themselves.
#
# Requires the Application health customization in gitops/helm-values/server3/argocd.yaml
# so sync waves wait for each Root App to become Healthy before starting the next wave.
#
# Manual apply (one-time, after ArgoCD.yaml):
#   kubectl apply -f gitops/argocd-manifests/Bootstrap.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/homelab
    targetRevision: HEAD
    path: gitops/argocd-manifests/roots
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
