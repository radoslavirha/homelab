# Loki — shared base values (Monolithic / single-binary mode)
# Upstream: https://github.com/grafana-community/helm-charts/tree/main/charts/loki
# Receives logs from OTel Collector via OTLP HTTP on port 3100.

deploymentMode: Monolithic

loki:
  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  auth_enabled: false

# Single replica for homelab
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
    storageClass: longhorn

# Disable read/write/backend when using Monolithic mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable minio sub-chart (using filesystem storage)
minio:
  enabled: false

# Disable self-monitoring and test pods for homelab
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
