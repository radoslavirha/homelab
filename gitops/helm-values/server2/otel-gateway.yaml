# OTel Gateway — server2 cluster overrides
# Shared base values: gitops/helm-values/otel-gateway.yaml
# Role: forwarder — collects OTLP from local apps and forwards everything
#       to the central otel-gateway on server3 via OTLP/gRPC.
# All backend fan-out (Loki, Tempo, Prometheus) happens on server3.
# Bearer token auth: sends Authorization header on the OTLP/gRPC exporter to server3.

extraEnvsFrom:
  - secretRef:
      name: otel-auth-token

config:
  processors:
    resource:
      attributes:
        - action: insert
          key: k8s.cluster.name
          value: server2

  exporters:
    otlp_grpc/server3:
      endpoint: "otel.server3.home:4317"
      tls:
        insecure: true
      headers:
        Authorization: "Bearer ${env:OTEL_AUTH_TOKEN}"

  service:
    pipelines:
      logs:
        exporters: [otlp_grpc/server3]
      traces:
        exporters: [otlp_grpc/server3]
      metrics:
        exporters: [otlp_grpc/server3]
