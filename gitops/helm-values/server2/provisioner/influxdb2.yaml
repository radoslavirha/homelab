global:
  cluster: server2
  baoHost: "http://vault.server3.home"
  baoTokenSecret: openbao-provision-token

influxdb2:
  host: "http://influxdb2.iot.svc.cluster.local"
  org: homelab
  adminTokenSecret: influxdb2
  adminTokenKey: admin-token

  jobs:
    loxone:
      syncWave: "0"
      buckets:
        - name: loxone
          retentionSeconds: 1209600
        - name: loxone_downsample
          retentionSeconds: 0
      tasks:
        - name: "Downsample Loxone"
          flux: |
            option task = {name: "Downsample Loxone", every: 10m}

            from(bucket: "loxone")
                |> range(start: -task.every)
                |> aggregateWindow(every: task.every, fn: mean)
                |> to(bucket: "loxone_downsample")
      tokens:
        - description: grafana-read
          readBuckets:
            - loxone
            - loxone_downsample
          baoPath: server2-influxdb2-grafana
          baoCluster: server3
          baoKey: token

    telegraf:
      syncWave: "1"
      buckets: []
      tasks: []
      tokens:
        - description: telegraf-write
          writeBucket: loxone
          baoPath: telegraf-influxdb2
          baoKey: token
