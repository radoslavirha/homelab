# ExternalDNS — shared Helm values (Unifi webhook provider)
# Upstream values.yaml: https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
# Webhook provider docs: https://github.com/lexfrei/external-dns-unifios-webhook
# Cluster-specific overrides (domainFilters, txtOwnerId): gitops/helm-values/<cluster>/external-dns.yaml

provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/lexfrei/external-dns-unifios-webhook
      tag: "0.2.2"
    env:
      - name: WEBHOOK_UNIFI_HOST
        value: "https://192.168.1.1"
      - name: WEBHOOK_UNIFI_API_KEY
        valueFrom:
          secretKeyRef:
            name: unifi-credentials
            key: api-key
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10

# Watch Gateway API HTTPRoutes, Traefik IngressRoute CRDs, and DNSEndpoint CRDs for hostnames.
# Hostnames from HTTPRoutes come from spec.hostnames; from IngressRoutes via Host() match rule.
# Target IP comes from Gateway status.addresses (set via statusAddress.ip in traefik helm values).
# DNSEndpoint CRD (crd source) is used for bare DNS entries not tied to any route.
sources:
  - gateway-httproute
  - traefik-proxy
  - crd

# Safe starting policy — only creates/updates, never deletes
policy: upsert-only

# TXT registry tracks ownership of created records
registry: txt

# React immediately to HTTPRoute create/update/delete events
triggerLoopOnEvent: true

interval: 1m
