global:
  domain: argocd.server3.home

notifications:
  argocdUrl: http://argocd.server3.home

configs:
  cm:
    admin.enabled: "true"
    url: http://argocd.server3.home
  params:
    server.insecure: "true"
  secret:
    createSecret: false

dex:
  enabled: false

server:
  replicas: 1
  httproute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - argocd.server3.home
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

controller:
  replicas: 1
