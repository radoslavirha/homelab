global:
  domain: argocd.server3.home

notifications:
  argocdUrl: http://argocd.server3.home

configs:
  cm:
    admin.enabled: "true"
    url: http://argocd.server3.home
    # Restore health assessment for Application CRD so App-of-Apps sync waves
    # wait for each child Application to reach Healthy before the next wave.
    # Removed from ArgoCD core in v1.8 — re-enabled via Lua customization.
    # https://argo-cd.readthedocs.io/en/stable/operator-manual/upgrading/1.7-1.8
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
  params:
    server.insecure: "true"
  secret:
    createSecret: false

dex:
  enabled: false

server:
  replicas: 1
  httproute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - argocd.server3.home
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

controller:
  replicas: 1
