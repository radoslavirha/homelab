# OTel Gateway — server3 cluster overrides
# Shared base values: gitops/helm-values/otel-gateway.yaml
# Defines: resource processor (k8s.cluster.name=server3) + exporter endpoint URLs.
# Bearer token auth: validates inbound OTLP via bearertokenauth extension.

extraEnvsFrom:
  - secretRef:
      name: otel-auth-token

config:
  extensions:
    bearertokenauth:
      token: "${env:OTEL_AUTH_TOKEN}"

  receivers:
    otlp:
      protocols:
        grpc:
          auth:
            authenticator: bearertokenauth
        http:
          auth:
            authenticator: bearertokenauth

  processors:
    resource:
      attributes:
        - action: insert
          key: k8s.cluster.name
          value: server3

  exporters:
    otlp_http/loki:
      endpoint: "http://loki.monitoring.svc.cluster.local:3100/otlp"
    otlp_grpc/tempo:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true
    prometheusremotewrite:
      endpoint: "http://prometheus.monitoring.svc.cluster.local:80/api/v1/write"
      resource_to_telemetry_conversion:
        enabled: true

  service:
    extensions: [health_check, bearertokenauth]
    pipelines:
      logs:
        exporters: [otlp_http/loki]
      traces:
        exporters: [otlp_grpc/tempo]
      metrics:
        exporters: [prometheusremotewrite]
