# Grafana — server3 cluster overrides
# Shared base values: gitops/helm-values/grafana.yaml

extraSecretMounts:
  - name: server1-influxdb2-grafana
    secretName: server1-influxdb2-grafana
    defaultMode: 0440
    mountPath: /etc/secrets/server1-influxdb2-grafana
    readOnly: true
  - name: server2-influxdb2-grafana
    secretName: server2-influxdb2-grafana
    defaultMode: 0440
    mountPath: /etc/secrets/server2-influxdb2-grafana
    readOnly: true
