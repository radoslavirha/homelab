# interactive-map-feeder-api — production overrides
# Cluster-specific VAR_* (VAR_PUBLIC_DOMAIN, VAR_PROTOCOL) are in server2/apps/interactive-map-feeder-api/production.yaml

apps:
  interactive-map-feeder-api:
    image:
      tag: "0.7.2"
    templates:
      config:
        content: |
          {
              "serviceName": "{{ APPLICATION }}",
              "server": {
                  "httpPort": {{ CONTAINER_PORT }}
              },
              "publicURL": "{{ VAR_PROTOCOL }}://{{ COMPONENT }}.{{ VAR_PUBLIC_DOMAIN }}/{{ PATH_NAME }}",
              "logger": {
                  "enabled": true,
                  "level": "info"
              },
              "otel": {
                  "metrics": {
                      "enabled": true,
                      "exporter": {
                          "url": "http://otel-collector-opentelemetry-collector:4318/v1/metrics"
                      }
                  },
                  "traces": {
                      "enabled": true,
                      "exporter": {
                          "url": "http://otel-collector-opentelemetry-collector:4318/v1/traces"
                      }
                  },
                  "logs": {
                      "enabled": true,
                      "exporter": {
                          "url": "http://otel-collector-opentelemetry-collector:4318/v1/logs"
                      }
                  }
              }
          }
