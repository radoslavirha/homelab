# miot-bridge-api — shared base values
# Env-specific: replicas, udpIngress.entrypoint, templates.config.content, VAR_* → production.yaml / sandbox.yaml

apps:
  miot-bridge-api:
    image:
      repository: radoslavirha/miot-bridge-api
      tag: "0.16.0"
      pullPolicy: Always
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 250Mi
      limits:
        cpu: 500m
        memory: 500Mi
    labels:
      component: api
      partOf: iot
    services:
      http:
        enabled: true
        protocol: TCP
        port: 80
        targetPort: 4000
      udp:
        enabled: true
        protocol: UDP
        port: 4000
        targetPort: 4000
    ingress:
      enabled: true
      serviceRef: http
      pathName: miot-bridge
    udpIngress:
      enabled: true
      serviceRef: udp
      # entrypoint defined per-env: udp-miot-prod (production) / udp-miot-sbx (sandbox)
    secretRefs:
      - name: miot-bridge-api-mqtt-credentials
        keys:
          - SECRET_MQTT_MIOT_BRIDGE_USERNAME
          - SECRET_MQTT_MIOT_BRIDGE_PASSWORD
      - name: miot-bridge-api-mongodb-credentials
        keys:
          - SECRET_MONGODB_DATABASE
          - SECRET_MONGODB_USERNAME
          - SECRET_MONGODB_PASSWORD
    templates:
      config:
        file: production.json
        path: /home/app/config
        # content defined per-env
