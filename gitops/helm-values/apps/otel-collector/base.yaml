# Apps OTel Collector — shared base values
# Pure OTLP forwarder: receives telemetry pushed by apps in the same namespace,
# adds environment attribute (defined per-env), forwards to the central otel-gateway.

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

clusterRole:
  create: false

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    # environment attribute is defined per-env
    resource:
      attributes: []
    batch: {}

  exporters:
    otlp/gateway:
      endpoint: otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/gateway]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/gateway]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/gateway]
