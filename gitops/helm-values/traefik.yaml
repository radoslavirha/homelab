# Traefik — shared Helm values (bare-metal, Gateway API, hostNetwork)
# Upstream values.yaml: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
# Cluster-specific overrides (IPs, hostnames): gitops/helm-values/<cluster>/traefik.yaml

hostNetwork: true

# Required when hostNetwork: true so CoreDNS is still used for *.svc.cluster.local
# Without this, the host's DNS resolver is used and cluster DNS names don't resolve.
deployment:
  dnsPolicy: ClusterFirstWithHostNet

# With hostNetwork: true and ports.web.port: 80, Traefik binds port 80 directly on the
# host network stack. Port 80 is privileged (<1024) and requires root or NET_BIND_SERVICE.
#
# The upstream chart default uses port 8000 internally (non-privileged) and only exposes
# port 80 via the Service — so it can run as non-root 65532 without any extra capability.
# That model does not work with hostNetwork because the host listens on the container port.
#
# Solution: run as root with NET_BIND_SERVICE. Also override podSecurityContext to clear
# the upstream default of runAsNonRoot: true, which would conflict with runAsUser: 0.
securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  runAsGroup: 0
  runAsNonRoot: false
  runAsUser: 0

podSecurityContext:
  runAsGroup: 0
  runAsNonRoot: false
  runAsUser: 0

updateStrategy:
  type: Recreate

ports:
  web:
    port: 80
  metrics: null

api:
  dashboard: true
  insecure: true

service:
  # ClusterIP + externalIPs is the correct pattern for bare metal.
  # LoadBalancer (default) waits for status.loadBalancer.ingress which a bare metal cluster
  # never populates, causing ArgoCD to mark the Service as Progressing forever.
  type: ClusterIP

ingressClass:
  enabled: false

# Enable Gateway API Provider & disable KubernetesIngress provider.
# Providers tell Traefik where to find routing configuration.
providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
    # Watch all namespaces so Middleware CRDs can be referenced via HTTPRoute ExtensionRef.
    namespaces: []
  kubernetesGateway:
    enabled: true

# Gateway Listeners
gateway:
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All

logs:
  general:
    level: INFO
    otlp:
      enabled: true
      grpc:
        enabled: true
        endpoint: "otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317"
        insecure: true
  access:
    enabled: true
    otlp:
      enabled: true
      grpc:
        enabled: true
        endpoint: "otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317"
        insecure: true

tracing:
  otlp:
    enabled: true
    grpc:
      enabled: true
      endpoint: "otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317"
      insecure: true

metrics:
  prometheus: null
  otlp:
    enabled: true
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    grpc:
      enabled: true
      endpoint: "otel-gateway-opentelemetry-collector.monitoring.svc.cluster.local:4317"
      insecure: true

experimental:
  otlpLogs: true
