suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should create a Deployment when rollout is disabled
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.image.tag: "1.0.0"
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: api-iot-my-app

  - it: should NOT create a Deployment when rollout is enabled
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.rollout.enabled: true
      apps.my-app.rollout.strategy: canary
    asserts:
      - hasDocuments:
          count: 0

  - it: should set default replica count to 1
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should respect custom replica count
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use latest as default image tag
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":latest$"

  - it: should use provided image tag
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.image.tag: "2.5.1"
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/my-app:2.5.1"

  - it: should include standard Helm labels
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should add container port name when services defined
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: true
      apps.my-app.services.http.protocol: TCP
      apps.my-app.services.http.port: 80
      apps.my-app.services.http.targetPort: 4000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 4000

  - it: should render checksum annotation when templates defined
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.templates.config.file: config.json
      apps.my-app.templates.config.path: /app/config
      apps.my-app.templates.config.content: '{"key":"value"}'
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should NOT render annotations block when no templates and no podAnnotations
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - isNull:
          path: spec.template.metadata.annotations

  - it: should merge podAnnotations with checksum
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.podAnnotations.custom/annotation: "hello"
      apps.my-app.templates.config.file: config.json
      apps.my-app.templates.config.path: /app/config
      apps.my-app.templates.config.content: '{"key":"value"}'
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom/annotation"]
          value: "hello"
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should apply container security context
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.containerSecurityContext.allowPrivilegeEscalation: false
      apps.my-app.containerSecurityContext.readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should apply pod security context
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.podSecurityContext.runAsNonRoot: true
      apps.my-app.podSecurityContext.runAsUser: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: should apply liveness and readiness probes
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.livenessProbe.httpGet.path: /health
      apps.my-app.livenessProbe.httpGet.port: http
      apps.my-app.readinessProbe.httpGet.path: /ready
      apps.my-app.readinessProbe.httpGet.port: http
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  - it: should apply deployment strategy
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.strategy.type: RollingUpdate
      apps.my-app.strategy.rollingUpdate.maxSurge: 1
      apps.my-app.strategy.rollingUpdate.maxUnavailable: 0
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: should apply imagePullSecrets
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.imagePullSecrets[0].name: my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret

  - it: should set serviceAccountName when serviceAccount.create is true
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.serviceAccount.create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: api-iot-my-app

  - it: should set serviceAccountName when serviceAccount.name is provided
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: should NOT set serviceAccountName when serviceAccount not configured
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.serviceAccountName

  - it: should apply nodeSelector
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.nodeSelector.disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should apply default resource requests and limits
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "250m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "500Mi"
