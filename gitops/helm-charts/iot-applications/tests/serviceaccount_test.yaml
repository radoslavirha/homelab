suite: serviceaccount tests
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create ServiceAccount when create is true
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: api-iot-my-app

  - it: should use custom name when provided
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.serviceAccount.create: true
      apps.my-app.serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should add annotations when provided
    values:
      - ./test-values/sa-annotations.yaml
    asserts:
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-value

  - it: should NOT create ServiceAccount when create is false
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should NOT create ServiceAccount when not configured
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0
