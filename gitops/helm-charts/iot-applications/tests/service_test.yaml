suite: service tests
templates:
  - templates/service.yaml
tests:
  - it: should create a Service for each enabled service entry
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: true
      apps.my-app.services.http.protocol: TCP
      apps.my-app.services.http.port: 80
      apps.my-app.services.http.targetPort: 4000
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: api-iot-my-app-http

  - it: should use short service name as port name
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: true
      apps.my-app.services.http.port: 80
      apps.my-app.services.http.targetPort: 4000
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http

  - it: should NOT create a Service when disabled
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should be type ClusterIP
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: true
      apps.my-app.services.http.port: 80
      apps.my-app.services.http.targetPort: 4000
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should include standard Helm labels
    set:
      apps.my-app.image.repository: ghcr.io/example/my-app
      apps.my-app.labels.component: api
      apps.my-app.labels.partOf: iot
      apps.my-app.ingress.enabled: false
      apps.my-app.services.http.enabled: true
      apps.my-app.services.http.port: 80
      apps.my-app.services.http.targetPort: 4000
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
